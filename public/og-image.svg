<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050508;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0a0a12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f1a;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22D3EE;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22D3EE;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow Filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Mesh Pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(59,130,246,0.08)" stroke-width="1"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Mesh Grid -->
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Glowing Orbs -->
  <circle cx="200" cy="150" r="300" fill="url(#accentGrad)" opacity="0.08" filter="url(#glow)"/>
  <circle cx="1000" cy="450" r="250" fill="url(#accentGrad)" opacity="0.06" filter="url(#glow)"/>
  <circle cx="600" cy="315" r="400" fill="url(#accentGrad)" opacity="0.04"/>
  
  <!-- Neural Network Lines (Left Side) -->
  <g opacity="0.3">
    <line x1="50" y1="100" x2="150" y2="200" stroke="url(#accentGrad)" stroke-width="2"/>
    <line x1="150" y1="200" x2="80" y2="350" stroke="url(#accentGrad)" stroke-width="2"/>
    <line x1="80" y1="350" x2="180" y2="480" stroke="url(#accentGrad)" stroke-width="2"/>
    <line x1="150" y1="200" x2="250" y2="150" stroke="url(#accentGrad)" stroke-width="1.5"/>
    <line x1="250" y1="150" x2="300" y2="280" stroke="url(#accentGrad)" stroke-width="1.5"/>
    
    <!-- Nodes -->
    <circle cx="50" cy="100" r="8" fill="#3B82F6" filter="url(#glow)"/>
    <circle cx="150" cy="200" r="10" fill="#8B5CF6" filter="url(#glow)"/>
    <circle cx="80" cy="350" r="8" fill="#22D3EE" filter="url(#glow)"/>
    <circle cx="180" cy="480" r="8" fill="#3B82F6" filter="url(#glow)"/>
    <circle cx="250" cy="150" r="6" fill="#8B5CF6" filter="url(#glow)"/>
    <circle cx="300" cy="280" r="6" fill="#22D3EE" filter="url(#glow)"/>
  </g>
  
  <!-- Neural Network Lines (Right Side) -->
  <g opacity="0.3">
    <line x1="1100" y1="150" x2="1000" y2="250" stroke="url(#accentGrad)" stroke-width="2"/>
    <line x1="1000" y1="250" x2="1120" y2="380" stroke="url(#accentGrad)" stroke-width="2"/>
    <line x1="1120" y1="380" x2="1050" y2="520" stroke="url(#accentGrad)" stroke-width="2"/>
    <line x1="1000" y1="250" x2="900" y2="200" stroke="url(#accentGrad)" stroke-width="1.5"/>
    <line x1="900" y1="200" x2="850" y2="330" stroke="url(#accentGrad)" stroke-width="1.5"/>
    
    <!-- Nodes -->
    <circle cx="1100" cy="150" r="8" fill="#22D3EE" filter="url(#glow)"/>
    <circle cx="1000" cy="250" r="10" fill="#8B5CF6" filter="url(#glow)"/>
    <circle cx="1120" cy="380" r="8" fill="#3B82F6" filter="url(#glow)"/>
    <circle cx="1050" cy="520" r="8" fill="#22D3EE" filter="url(#glow)"/>
    <circle cx="900" cy="200" r="6" fill="#8B5CF6" filter="url(#glow)"/>
    <circle cx="850" cy="330" r="6" fill="#3B82F6" filter="url(#glow)"/>
  </g>
  
  <!-- Main Logo Icon -->
  <g transform="translate(600, 200)">
    <!-- Outer hexagon -->
    <polygon points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30" fill="none" stroke="url(#accentGrad)" stroke-width="3" filter="url(#glow)"/>
    
    <!-- Inner connections -->
    <line x1="0" y1="-30" x2="26" y2="-15" stroke="url(#accentGrad)" stroke-width="2" opacity="0.6"/>
    <line x1="26" y1="-15" x2="26" y2="15" stroke="url(#accentGrad)" stroke-width="2" opacity="0.6"/>
    <line x1="26" y1="15" x2="0" y2="30" stroke="url(#accentGrad)" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="30" x2="-26" y2="15" stroke="url(#accentGrad)" stroke-width="2" opacity="0.6"/>
    <line x1="-26" y1="15" x2="-26" y2="-15" stroke="url(#accentGrad)" stroke-width="2" opacity="0.6"/>
    <line x1="-26" y1="-15" x2="0" y2="-30" stroke="url(#accentGrad)" stroke-width="2" opacity="0.6"/>
    
    <!-- Center A -->
    <text x="0" y="12" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="900" fill="url(#textGrad)" text-anchor="middle" filter="url(#glow)">A</text>
    
    <!-- Orbiting dots -->
    <circle cx="0" cy="-75" r="5" fill="#22D3EE" filter="url(#glow)"/>
    <circle cx="65" cy="37" r="4" fill="#8B5CF6" filter="url(#glow)"/>
    <circle cx="-65" cy="37" r="4" fill="#3B82F6" filter="url(#glow)"/>
  </g>
  
  <!-- Brand Name -->
  <text x="600" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="white" text-anchor="middle" letter-spacing="8" filter="url(#glow)">AIZONET</text>
  
  <!-- Tagline -->
  <text x="600" y="395" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="500" fill="url(#textGrad)" text-anchor="middle" letter-spacing="4">AI-POWERED MARKETING</text>
  
  <!-- Sub-tagline -->
  <text x="600" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="400" fill="rgba(255,255,255,0.5)" text-anchor="middle">Transforming Businesses with Intelligent Digital Strategies</text>
  
  <!-- Bottom Stats -->
  <g transform="translate(600, 530)">
    <text x="-200" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#3B82F6" text-anchor="middle">500+ CLIENTS</text>
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#8B5CF6" text-anchor="middle">AI-DRIVEN</text>
    <text x="200" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#22D3EE" text-anchor="middle">RAIPUR, INDIA</text>
  </g>
  
  <!-- Corner Accents -->
  <rect x="40" y="40" width="80" height="3" fill="url(#accentGrad)" opacity="0.5"/>
  <rect x="40" y="40" width="3" height="80" fill="url(#accentGrad)" opacity="0.5"/>
  
  <rect x="1080" y="587" width="80" height="3" fill="url(#accentGrad)" opacity="0.5"/>
  <rect x="1157" y="510" width="3" height="80" fill="url(#accentGrad)" opacity="0.5"/>
</svg>
