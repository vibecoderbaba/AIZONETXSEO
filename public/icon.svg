<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22D3EE;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect x="5" y="5" width="90" height="90" rx="20" fill="#0a0a0f" stroke="url(#grad)" stroke-width="3"/>
  
  <!-- Neural Network Nodes -->
  <circle cx="30" cy="35" r="6" fill="url(#gradInner)" filter="url(#glow)"/>
  <circle cx="50" cy="25" r="6" fill="url(#gradInner)" filter="url(#glow)"/>
  <circle cx="70" cy="35" r="6" fill="url(#gradInner)" filter="url(#glow)"/>
  <circle cx="25" cy="60" r="6" fill="url(#gradInner)" filter="url(#glow)"/>
  <circle cx="50" cy="70" r="8" fill="url(#grad)" filter="url(#glow)"/>
  <circle cx="75" cy="60" r="6" fill="url(#gradInner)" filter="url(#glow)"/>
  
  <!-- Neural Connections -->
  <line x1="30" y1="35" x2="50" y2="25" stroke="url(#grad)" stroke-width="2" opacity="0.6"/>
  <line x1="50" y1="25" x2="70" y2="35" stroke="url(#grad)" stroke-width="2" opacity="0.6"/>
  <line x1="30" y1="35" x2="25" y2="60" stroke="url(#grad)" stroke-width="2" opacity="0.6"/>
  <line x1="70" y1="35" x2="75" y2="60" stroke="url(#grad)" stroke-width="2" opacity="0.6"/>
  <line x1="25" y1="60" x2="50" y2="70" stroke="url(#grad)" stroke-width="2" opacity="0.6"/>
  <line x1="75" y1="60" x2="50" y2="70" stroke="url(#grad)" stroke-width="2" opacity="0.6"/>
  <line x1="30" y1="35" x2="70" y2="35" stroke="url(#grad)" stroke-width="1.5" opacity="0.4"/>
  
  <!-- Center A Letter -->
  <text x="50" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="900" fill="white" text-anchor="middle" filter="url(#glow)">A</text>
</svg>
