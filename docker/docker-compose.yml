version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: aizonet-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: aizonet_admin
      POSTGRES_PASSWORD: aizonet_secure_password
      POSTGRES_DB: aizonet_saas
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: aizonet-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

volumes:
  postgres_data:
  redis_data:
